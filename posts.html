---
layout: default
title: Posts
---

<div class="post">
  {% for post in site.posts %}
  <a href="{{ post.url }}">
    <div style="display: flex; align-items: center; justify-content: space-between;">
      <h3>{{ post.title }}</h3>
      <time datetime="{{ post.date }}">{{ post.date | date: "%B %d, %Y" }}</time>
    </div>
  </a>
  {% endfor %}
</div>
