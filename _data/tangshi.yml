- name: 静夜思
  author: 李白
  content: |
          床前明月光，疑是地上霜。
          举头望明月，低头思故乡。

- name: 登鹳雀楼
  author: 王之涣
  content: |
          白日依山尽，黄河入海流。
          欲穷千里目，更上一层楼。

- name: 春晓
  author: 孟浩然
  content: |
          春眠不觉晓，处处闻啼鸟。
          夜来风雨声，花落知多少。

- name: 望庐山瀑布
  author: 李白
  content: |
          日照香炉生紫烟，遥看瀑布挂前川。
          飞流直下三千尺，疑是银河落九天。

- name: 江雪
  author: 柳宗元
  content: |
          千山鸟飞绝，万径人踪灭。
          孤舟蓑笠翁，独钓寒江雪。

- name: 黄鹤楼送孟浩然之广陵
  author: 李白
  content: |
          故人西辞黄鹤楼，烟花三月下扬州。
          孤帆远影碧空尽，唯见长江天际流。

- name: 赋得古原草送别
  author: 白居易
  content: |
          离离原上草，一岁一枯荣。
          野火烧不尽，春风吹又生。
          远芳侵古道，晴翠接荒城。
          又送王孙去，萋萋满别情。

- name: 凉州词
  author: 王翰
  content: |
          葡萄美酒夜光杯，欲饮琵琶马上催。
          醉卧沙场君莫笑，古来征战几人回？

- name: 出塞
  author: 王昌龄
  content: |
          秦时明月汉时关，万里长征人未还。
          但使龙城飞将在，不教胡马度阴山。

- name: 枫桥夜泊
  author: 张继
  content: |
          月落乌啼霜满天，江枫渔火对愁眠。
          姑苏城外寒山寺，夜半钟声到客船。
