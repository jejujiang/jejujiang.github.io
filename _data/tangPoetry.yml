- name: 《山居秋暝》
  author: 王维
  content: 空山新雨后，天气晚来秋。
           明月松间照，清泉石上流。
           竹喧归浣女，莲动下渔舟。
           随意春芳歇，王孙自可留。

- name: 《登鹳雀楼》
  author: 王之涣
  content: The sun sets behind the mountains, far and wide,
           The Yellow River flows to the sea with pride.
           To extend your view a thousand miles, you must,
           Climb yet another floor, as the ancients trust.

- name: 《静夜思》
  author: 李白
  content: 床前明月光，疑是地上霜。
           举头望明月，低头思故乡。

- name: 《春望》
  author: 杜甫
  content: 国破山河在，城春草木生。
           感时花溅泪，恨别鸟惊心。
           烽火连三月，家书抵万金。
           白头搔更短，浑欲不胜簪。

- name: Love Seeds《相思》
  author: 王维 (许渊冲译)
  content: Red beans grow in southern land,
           In spring they sprout with tender care.
           Gather them, I pray, with your hand,
           For they symbolize love rare.
