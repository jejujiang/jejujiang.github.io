# Basic
name:               "Tale Café"
description:        "Sip, share, and let the tale unfold."

coffees:
  - name: Espresso
  - name: Double Espresso
  - name: Latte
  - name: Cappuccino
  - name: Flat white
  - name: Macchiato
  - name: Mocha
  - name: Americano

# jekyll-seo-tag, see: http://www.rubydoc.info/gems/jekyll-seo-tag/1.2.0
author:             "Kiko"
#twitter:
#  username:         "gfjaru"
#facebook:
#  app_id:           1234
#    publisher:      1234

url:                ""
baseurl:            "/blog"
permalink:          /:year/:month/:day/:title/

# Markdown
markdown:           kramdown

# Navigation
nav:
  - name:           "Articles"
    remote:         false
    localpath:      "articles"
  - name:           "About"
    remote:         false
    localpath:      "about"

#  - name:           "Download"
#    remote:         true
#    href:           "//github.com/gfjaru/Kiko/releases"

# Sass
sass:
  style:            :compressed

# Scopes
defaults:
  -
    scope:
      path:         ""
      type:         "pages"
    values:
      layout:       "page"
  -
    scope:
      path:         ""
      type:         "posts"
    values:
      layout:       "post"

plugins:
  - jekyll-seo-tag
