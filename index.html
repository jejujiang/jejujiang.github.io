---
layout: default
---
<header class="masthead">
  <h1 class="masthead-title">
    <a href="{{ site.baseurl }}/">{{ site.name }}<span>&#39;s Café</span></a>
  </h1>
  <nav class="masthead-nav">
    {% for nav in site.nav %}
      {% if nav.remote %}
      <a href="{{ nav.href }}">{{ nav.name }}</a>
      {% else %}
      <a href="{{ site.baseurl }}/{{ nav.localpath }}">{{ nav.name }}</a>
      {% endif %}
    {% endfor %}
  </nav>
</header>
<div class="content list">
{% for coffee in site.coffees %}
  <div class="list-item">
    <h2 class="list-post-title">
      {{ coffee.name }}
    </h2>
  </div>
{% endfor %}
</div>
