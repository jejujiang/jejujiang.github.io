<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life is like dust.</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-logo">
            <span>Life is like dust.</span>
        </div>
        <ul class="navbar-links">
            <li><a href="/">Home</a></li>
            <li><a href="/about.html">About</a></li>
        </ul>
    </nav>

    <!-- 英雄部分 -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title animate-fade-in">Welcome to the Future</h1>
            <p class="hero-subtitle animate-fade-in">Experience the power of Web3.0</p>
            <a href="#tangshi" class="hero-button animate-fade-in">Get Started</a>
        </div>
    </section>

    <!-- 卡片部分 -->
    <section class="cards-section" id="tangshi">
	{% for item in site.data.tangshi %}
        <div class="card animate-slide-up">
  	    <h2>{{ item.name }} - {{ item.author }}</h2>
	    <p>{{ item.content }}</p>
        </div>
        {% endfor %}
    </section>

    <div class="top">
    <a href="#" class="hero-button animate-fade-in">Top</a>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
	    <p>&copy; 2025 <a href="https://www.deepseek.com/">DeepSeek</a> All rights reserved.</p>
    </footer>
</body>
</html>
