<article>
	<section class="section">
	<div class="content">
		<ul>
		{% for post in site.posts %}
		<li>
			<time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%Y-%m-%d" }}</time>
			<a  href="{{ post.url }}">{{ post.title }}</a>
		</li>
		{% endfor %}
		</ul>
	</div>
	</setction
</article>
